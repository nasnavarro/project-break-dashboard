<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="author" content="Ignacio Navarro" />
    <meta name="description" content="Tiempo meteorológico — Project Break Dashboard" />
    <link rel="icon" type="image/x-icon" href="./img/common/favicon.ico" />
    <title>Project Break Dashboard: Weather</title>
    <link rel="stylesheet" href="./css/weather.css" />
  </head>
  <body data-page="weather">

    <main class="weather-main">

      <section class="weather-current" id="weather-current">
        <div class="weather-current-header">
          <img class="weather-current-icon" id="weather-icon" src="" alt="" />
          <div>
            <p class="weather-location" id="weather-location"></p>
            <p class="weather-description" id="weather-description"></p>
          </div>
        </div>
        <div class="weather-current-data">
          <div class="weather-stat">
            <span class="weather-stat-value" id="weather-temp"></span>
            <span class="weather-stat-label">Temperatura</span>
          </div>
          <div class="weather-stat">
            <span class="weather-stat-value" id="weather-feels"></span>
            <span class="weather-stat-label">Sensación</span>
          </div>
          <div class="weather-stat">
            <span class="weather-stat-value" id="weather-humidity"></span>
            <span class="weather-stat-label">Humedad</span>
          </div>
          <div class="weather-stat">
            <span class="weather-stat-value" id="weather-wind"></span>
            <span class="weather-stat-label">Viento</span>
          </div>
          <div class="weather-stat">
            <span class="weather-stat-value" id="weather-cloud"></span>
            <span class="weather-stat-label">Nubosidad</span>
          </div>
        </div>
      </section>

      <div class="weather-hourly-container">
        <h2 class="weather-section-title">Previsión por horas</h2>
        <section class="weather-hourly" id="weather-hourly"></section>
      </div>

    </main>

  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/utils/weather.js"></script>
  </body>
</html>
