<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="author" content="Ignacio Navarro" />
    <meta name="description" content="Home de mi espacio personal: Ignacio Navarro"/>
    <link rel="icon" type="image/x-icon" href="./img/common/favicon.ico"/>
    <title>Project Break Dashboard Ignacio Navarro: Home</title>
    <link rel="stylesheet" href="./css/index.css">
  </head>
  <body data-page="index">

    <main class="dashboard-grid">

      <!-- Sección del reloj digital -->
      <section class="dashboard-section" id="section-clock">
        <h2 class="dashboard-section-title">Reloj digital</h2>
        <div class="clock-container">
          <p class="clock-time" id="clock-time"></p>
          <p class="clock-date" id="clock-date"></p>
          <p class="clock-message" id="clock-message"></p>
        </div>
      </section>

      <!-- Sección de la estación meteorológica -->
      <section class="dashboard-section" id="section-weather">
        <h2 class="dashboard-section-title">Estación Meteorológica</h2>
      </section>

      <!-- Sección del generador de contraseñas -->
      <section class="dashboard-section" id="section-passwords">
        <h2 class="dashboard-section-title">Generador de contraseñas</h2>
        <div class="passwords-container" id="passwords-container"></div>
      </section>

      <!-- Sección del gestor de enlaces -->
      <section class="dashboard-section" id="section-links">
        <h2 class="dashboard-section-title">Gestor de enlaces</h2>
      </section>

    </main>

  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/utils/clock.js"></script>
  <script type="module" src="./js/templates/passwordWidget.js"></script>
  <script type="module" src="./js/utils/links.js"></script>
  </body>
</html>
